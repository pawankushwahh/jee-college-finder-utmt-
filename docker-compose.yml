version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: jee-college-recommender:latest
    container_name: jee-recommender
    ports:
      - "8000:8000"
    environment:
      # Allow requests from any origin (safe for a public read-only API).
      # Narrow this down in production: e.g. "https://yoursite.com"
      CORS_ORIGINS: "*"
      # Override data path if you mount an external volume with updated cutoffs.
      # DATA_PATH: /data/JEE_2025_Cutoffs.xlsx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
